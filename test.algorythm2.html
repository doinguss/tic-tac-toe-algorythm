<!DOCTYPE html>
<html>
    <head>
        <title>test</title>
    </head>
    <body bgcolor="#333">
        <span class="disp"></span>
    </body>
    <script src="setval.js"></script>
    <script src="algorythm.tictactoe(failsafe).js"></script>
    <script src="algorythm.tictactoe2.js"></script>
    <script>
        var p0=new mything("A");
        var p1=new failsafe("B");
        let player=0,score_p0=0,score_p1=0,tie=0;
        let board=[  ["","",""]
                    ,["","",""]
                    ,["","",""]];

        let turn=function(){
            switch(player){
                case 0:
                    p0.turn(board);
                    player=1;
                    break;
                case 1:
                    p1.turn(board);
                    player=0;
                    break;
                default:return;
            }
            switch(checkgamestate()){
                case 0:
                    //document.querySelector('span.disp').textContent=disp(board);
                    return disp(board);
                case 1:
                        player=-1;
                        score_p0++;
                        reset();
                    return "player 0 won =>  "+score_p0+" : "+score_p1+"   ties("+tie+")";
                    case 2:
                        score_p1++;
                        player=-1;
                        reset();
                    return "player 1 won =>  "+score_p0+" : "+score_p1+"   ties("+tie+")";
                    case 3:
                        tie++;
                        player=-1;
                        reset();
                    return "tie =>  "+score_p0+" : "+score_p1+"   ties("+tie+")";
            }
        }
        let checkgamestate=function(){
            let c=p0.p;
            for(let i=0;i<2;i++){
                for(let j=0;j<3;j++){
                    if(board[j][  0  ]!==c){continue;}
                    if(board[j][  1  ]!==c){continue;}
                    if(board[j][  2  ]!==c){continue;}
                    return i+1;
                }
                for(let j=0;j<3;j++){
                    if(board[0][  j  ]!==c){continue;}
                    if(board[1][  j  ]!==c){continue;}
                    if(board[2][  j  ]!==c){continue;}
                    return i+1;
                }
                for(let j=0;j<2;j++){
                    if(board[0][0+j*2]!==c){continue;}
                    if(board[1][  1  ]!==c){continue;}
                    if(board[2][2-j*2]!==c){continue;}
                    return i+1;
                }c=p1.p;
            }
            for(let i=0;i<3;i++){
                for(let j=0;j<3;j++){
                    if(board[i][  j  ]===""){return 0;}
                }
            }
            return 3;
        }
        let disp=function(b) {
            let o="=====\n";
            for(let i=0;i<3;i++){
                o+="|";
                for(let j=0;j<3;j++){
                    if(b[i][j]===""){o+='.';}
                    else{o+=(b[i][j]==p0.p?p0.p:p1.p);}}
                o+="|\n";
            }
            o+="=====\n";
            return o;
        }
        let reset=function(){
            player=0;
            board=[ ["","",""],
                    ["","",""],
                    ["","",""]];
        }
    </script>
</html>
